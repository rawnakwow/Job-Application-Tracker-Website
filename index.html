<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">



</head>
<body class="bg-gray-50 min-h-screen p-4 sm:p-8 font-sans antialiased text-gray-800">

    <div class="max-w-6xl mx-auto space-y-8">
        <header>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Job Application Tracker</h1>
        </header>

        <section class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="bg-white p-5 rounded-lg border border-gray-100 shadow-xs">
                <p class="text-xs font-semibold text-gray-400">Total</p>
                <h3 id="count-total" class="text-2xl font-bold text-slate-800 mt-1">0</h3>
            </div>
            <div class="bg-white p-5 rounded-lg border border-gray-100 shadow-xs">
                <p class="text-xs font-semibold text-gray-400">Interview</p>
                <h3 id="count-interview" class="text-2xl font-bold text-emerald-600 mt-1">0</h3>
            </div>
            <div class="bg-white p-5 rounded-lg border border-gray-100 shadow-xs">
                <p class="text-xs font-semibold text-gray-400">Rejected</p>
                <h3 id="count-rejected" class="text-2xl font-bold text-rose-600 mt-1">0</h3>
            </div>
        </section>

        <section class="bg-white rounded-xl border border-gray-100 shadow-xs p-6 space-y-6">
            
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-bold text-slate-800">Available Jobs</h2>
                <span class="text-sm font-medium text-gray-400"><span id="section-count">0</span> jobs</span>
            </div>

            <div class="flex flex-wrap gap-2 text-xs font-medium">
                <button onclick="switchTab('all')" id="tab-all" class="px-4 py-2 rounded bg-slate-900 text-white transition-all">All</button>
                <button onclick="switchTab('interview')" id="tab-interview" class="px-4 py-2 rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all">Interview</button>
                <button onclick="switchTab('rejected')" id="tab-rejected" class="px-4 py-2 rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all">Rejected</button>
            </div>

            <div id="job-cards-container" class="space-y-4">
            </div>

            <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-center space-y-3">
                <div class="text-blue-500 bg-blue-50 w-16 h-16 rounded-2xl flex items-center justify-center text-3xl">
                    <i class="fa-regular fa-file-lines"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800">No jobs available</h3>
                <p class="text-xs text-gray-400 max-w-xs">Check back soon for new job opportunities.</p>
            </div>

        </section>
    </div>

    <script src="Script.js"></script>
</body>
</html>
